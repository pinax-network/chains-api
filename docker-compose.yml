services:
  # Single container serving BOTH the REST API (3000) and the MCP HTTP server
  # (3001) from one process. They share a single in-memory store and one
  # refresh loop, so the same public RPC endpoints are never refreshed twice.
  chains-api:
    build: .
    image: chains-api:latest
    container_name: chains-api
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - MCP_PORT=3001
      - MCP_HOST=0.0.0.0
      # Assistant (optional): point at an OpenAI-compatible LLM server to
      # enable the /assistant/chat endpoint. For an Ollama running on the
      # Docker host, also uncomment extra_hosts below.
      # - ASSISTANT_LLM_URL=http://host.docker.internal:11434
      # - ASSISTANT_LLM_API_KEY=          # only for key-protected servers
      # - ASSISTANT_MODEL=qwen3
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"   # host-side Ollama on Linux
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
