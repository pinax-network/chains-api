<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Networks Relationships</title>
    <meta name="description" content="Interactive 3D visualization of blockchain network relationships, L2s, testnets, and beacon chains.">

    <!-- 3D Force Graph Library (served locally) -->
    <script src="3d-force-graph.min.js"></script>

    <!-- Inter font (served locally) -->
    <link rel="stylesheet" href="fonts/inter.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main UI Overlay -->
    <div id="ui-container">
        <!-- Header & Search -->
        <header class="glass-panel">
            <div class="header-top">
                <h1>Blockchain Networks</h1>
                <span class="subtitle" id="statsLine">Loading...</span>
            </div>
            <div class="search-box">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="Search by chain ID or name..." autocomplete="off">
                <kbd class="search-hint">/</kbd>
                <div id="searchDropdown" class="search-dropdown hidden"></div>
            </div>

            <!-- Filters -->
            <div class="filters">
                <button class="filter-btn active" data-filter="all">
                    <span class="filter-dot dot-all"></span>All
                </button>
                <button class="filter-btn" data-filter="Mainnet">
                    <span class="filter-dot dot-mainnet"></span>Mainnets
                </button>
                <button class="filter-btn" data-filter="Testnet">
                    <span class="filter-dot dot-testnet"></span>Testnets
                </button>
                <button class="filter-btn" data-filter="L2">
                    <span class="filter-dot dot-l2"></span>L2s
                </button>
                <button class="filter-btn" data-filter="Beacon">
                    <span class="filter-dot dot-beacon"></span>Beacons
                </button>
            </div>
        </header>

        <!-- Legend -->
        <div id="legend" class="glass-panel legend">
            <div class="legend-item"><span class="legend-dot" style="background:var(--color-mainnet)"></span>Mainnet</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--color-l2)"></span>L2</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--color-testnet)"></span>Testnet</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--color-beacon)"></span>Beacon</div>
            <div class="legend-sep"></div>
            <div class="legend-item"><span class="legend-line" style="background:rgba(139,92,246,0.7)"></span>L2 link</div>
            <div class="legend-item"><span class="legend-line" style="background:rgba(245,158,11,0.7)"></span>Testnet link</div>
        </div>

        <!-- Selected Node Details Panel -->
        <aside id="detailsPanel" class="glass-panel hidden">
            <button id="closeDetails" class="close-btn" aria-label="Close details">&times;</button>
            <div class="details-header">
                <div id="chainIcon" class="chain-icon"></div>
                <div class="details-title">
                    <h2 id="chainName">Chain Name</h2>
                    <div class="chain-meta">
                        <span class="badge" id="chainIdBadge">ID: --</span>
                        <span class="badge tag-badge" id="chainStatusBadge"></span>
                        <span class="badge tag-badge" id="chainTags">Tags: --</span>
                    </div>
                </div>
            </div>

            <div class="details-content">
                <div class="detail-row">
                    <span class="label">Native Currency</span>
                    <span class="value" id="chainCurrency">--</span>
                </div>
                <div class="detail-row" id="rowL1Parent" style="display: none;">
                    <span class="label">L1 Parent</span>
                    <span class="value" id="chainL1Parent">--</span>
                </div>
                <div class="detail-row" id="rowMainnet" style="display: none;">
                    <span class="label">Mainnet</span>
                    <span class="value" id="chainMainnet">--</span>
                </div>
                <div class="detail-row">
                    <span class="label" id="labelL2Children">L2 / L3</span>
                    <div class="value links-list" id="chainL2Children">--</div>
                </div>
                <div class="detail-row" id="rowTestnetChildren">
                    <span class="label" id="labelTestnetChildren">Testnets</span>
                    <div class="value links-list" id="chainTestnetChildren">--</div>
                </div>
                <div class="detail-row">
                    <span class="label">RPC Endpoints</span>
                    <div class="value links-list" id="chainRPCs">--</div>
                </div>
                <div class="detail-row">
                    <span class="label">Explorers</span>
                    <div class="value links-list" id="chainExplorers">--</div>
                </div>
                <div class="detail-row">
                    <span class="label">Website</span>
                    <span class="value" id="chainWebsite">--</span>
                </div>
            </div>
        </aside>

        <!-- Loading state -->
        <div id="loadingOverlay" class="glass-panel loading-overlay">
            <div class="spinner"></div>
            <p>Loading networks...</p>
            <p class="loading-sub">Fetching chain data and building graph</p>
        </div>
    </div>

    <!-- The 3D Graph Container -->
    <div id="3d-graph"></div>

    <script src="app.js"></script>
</body>

</html>
