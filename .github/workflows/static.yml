# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate OpenAPI spec
        # Refresh public/openapi.json from the live route schemas so the
        # published API reference can never drift from the deployed code.
        run: npm run openapi
      - name: Refresh offline data snapshot
        # Best-effort: pull a fresh /summary from the live API so the
        # dashboard's last-resort fallback isn't stale. Keeps the committed
        # copy when the API is unreachable at deploy time.
        run: |
          curl -sf --max-time 30 https://chains-api.riv-dev1.pinax.io/summary -o /tmp/summary.json \
            && node -e "JSON.parse(require('fs').readFileSync('/tmp/summary.json','utf8'))" \
            && mv /tmp/summary.json public/summary.json \
            || echo "Live /summary unavailable — keeping committed snapshot"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: './public'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
